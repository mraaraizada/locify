services:
  - type: web
    name: locify-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT server:app
    envVars:
      - key: PORT
        value: 10000
      - key: BACKEND_PORT
        value: 10000
      - key: ADMIN_COOKIE_PASS
        generateValue: true
      - key: MONGO_URL
        value: test
